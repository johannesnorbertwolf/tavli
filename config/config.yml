board_size: 24
pieces_per_player: 15
home_size: 6
die_sides: 6

# Training parameters
alpha: 0.0003              # DEPRECATED (was learning rate for manual TD update); ignored by Adam path
discount_factor: 1.0       # No discounting — correct for a finite terminal-reward game
epsilon_start: 1.0         # Start with 100% random moves
epsilon_end: 0.0           # EXP E1 (#81): dice randomness explores enough; random moves corrupt λ-returns
epsilon_decay: 0.9995      # Slower decay to allow for more exploration
epsilon_decay_games: 0     # If >0, linearly decay epsilon to epsilon_end over this many games
exploration_temperature: 1.0  # Softmax temperature during self-play exploration
num_epochs: 10             # Number of training epochs
games_per_epoch: 100       # Number of self-play games to generate per epoch
max_grad_norm: 5.0         # Clip global L2 norm of gradients pre-Adam; 0 disables
hidden_sizes: [256, 128, 64]  # Net2Net-expanded from [128, 64]
alpha_decay: 0.9999        # DEPRECATED; ignored by Adam path
alpha_decay_every: 1000    # DEPRECATED; ignored by Adam path
alpha_min: 0.00005         # DEPRECATED; ignored by Adam path
training_seed: null        # Set to an integer for reproducible benchmark runs
eval_every_epochs: 10      # Run quick eval against random every N epochs
eval_games_per_color: 100  # Eval budget per color at each eval point
eval_seed: null            # Optional fixed eval seed; null means choose a new random seed each evaluation run
eval_against_random: false # Keep optional random baseline eval
eval_against_gold: true    # Main progress metric: current model vs fixed gold model
eval_candidate_lookahead_plies: 1 # Expectimax lookahead for candidate at eval
eval_gold_lookahead_plies: 1      # Expectimax lookahead for gold opponent at eval
play_time_budget_s: 20.0          # Max time budget per AI move (iterative-deepening search)
beam_threshold: 0.08              # Absolute beam fallback (used only when search_relative_cutoff unset)
search_relative_cutoff: 0.08      # Keep moves within this relative fraction of the best
search_max_branch: 5              # Hard cap on moves expanded per node, on top of the relative cutoff
search_max_depth: 2               # Stop iterative deepening here. Set to 2 to disable 3-ply during play for now (3-ply works but is slow; revert to 3 to re-enable).
num_self_play_workers: 6          # Parallel self-play processes (1 = single-process)
gold_model_path: models/gold_v10.pth # Frozen reference model checkpoint (E5 endpoint, 2026-06-10; ~55.8% vs gold_v9)
use_bearoff_db: true               # Exact bear-off DB: exact equity at race leaves (search + self-play) and as TD bootstrap targets
bearoff_db_path: models/bearoff_db.npz # Cached one-sided bear-off database (built once on first use, ~few minutes)
training_state_path: training_state.json # Persisted scheduler state for resumed training
state_save_every_games: 100 # Save scheduler state every N games
model_save_every_epochs: 1   # Save model checkpoint every N epochs (0 disables)
lambda_decay_games: 0      # Disable lambda decay; use fixed lambda for this test

# TD(Lambda) parameters
lambda_start: 0.7          # Fixed TD(lambda) for stronger long-horizon credit assignment
lambda_end: 0.7            # Fixed TD(lambda) for stronger long-horizon credit assignment
lambda_decay: 0.999        # Decay rate for lambda per episode

# Optimizer + replay buffer (Adam replaces manual TD update)
learning_rate: 0.00003         # EXP E5 (#81): was 1e-4 (E2), 3e-4 before; staircase decay
lr_warmup_steps: 1000          # Linear warmup 0.1·lr → lr over this many optimizer steps; 0 disables
replay_buffer_capacity: 50000  # Samples held in the replay buffer
minibatch_size: 128            # SGD minibatch size
updates_per_game: 5            # Adam SGD steps run per ingested trajectory
min_buffer_to_train: 2000      # Don't start training until buffer holds at least this many samples

# Interactive play settings
play:
  eval_lookahead_plies: 4       # Default lookahead depth for ranked moves
  drill_correct_floor: 0.01     # Absolute floor for drill "correct" threshold (1 pp)
  drill_correct_relative: 0.03  # Fraction of best_score for drill "correct" threshold (3%)
