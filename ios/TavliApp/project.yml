name: TavliApp
options:
  bundleIdPrefix: com.plakoto
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
packages:
  TavliEngine:
    path: ../TavliEngine
targets:
  TavliApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    preBuildScripts:
      - name: Require Core ML model
        basedOnDependencyAnalysis: false
        script: |
          MODEL="$SRCROOT/TavliApp/Resources/PlakotoValue.mlpackage"
          if [ ! -f "$MODEL/Manifest.json" ]; then
            echo "error: PlakotoValue.mlpackage is missing — the app would silently fall back to random AI moves."
            echo "error: Generate it, then regenerate the project:"
            echo "error:   PYTHONPATH=. .venv/bin/python ios/scripts/convert_to_coreml.py && bash ios/TavliApp/setup.sh"
            exit 1
          fi
    sources:
      - path: TavliApp
        excludes:
          - "**/*.md"
    resources:
      - path: TavliApp/Resources
    dependencies:
      - package: TavliEngine
        product: TavliEngine
      - package: TavliEngine
        product: BoardGeometry
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "2"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.plakoto.TavliApp
        INFOPLIST_FILE: TavliApp/Info.plist
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
  TavliAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: TavliAppUITests
    dependencies:
      - target: TavliApp
      - package: TavliEngine
        product: BoardGeometry
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "2"
        PRODUCT_BUNDLE_IDENTIFIER: com.plakoto.TavliAppUITests
        SWIFT_VERSION: "5.9"
        DEVELOPMENT_TEAM: ""
        TEST_TARGET_NAME: TavliApp
schemes:
  TavliApp:
    build:
      targets:
        TavliApp: all
        TavliAppUITests: [test]
    test:
      targets:
        - TavliAppUITests
